<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Momentum — Site bloqué</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: 'Syne', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .wrap {
        padding: 24px;
        max-width: 480px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #10b981;
        margin: 0 auto 24px;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 12px;
      }
      p {
        color: #9ca3af;
        font-size: 15px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="dot"></div>
      <h1>Ce site est bloqué pendant ta session Momentum.</h1>
      <p>Reste concentré. Tu l'as décidé toi-même.</p>
    </div>
  </body>
</html>
