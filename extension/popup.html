<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Momentum</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: 300px;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: 'Syne', sans-serif;
        padding: 20px;
      }
      .hidden {
        display: none !important;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 20px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #10b981;
      }
      .brand span {
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 2px;
      }
      label {
        display: block;
        font-size: 11px;
        color: #9ca3af;
        margin-bottom: 4px;
      }
      input[type='email'],
      input[type='password'],
      input[type='text'],
      input[type='number'],
      select {
        width: 100%;
        background: #0a0a0a;
        border: 1px solid #374151;
        border-radius: 6px;
        padding: 8px 10px;
        color: #e5e5e5;
        font-family: inherit;
        font-size: 13px;
        margin-bottom: 12px;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #10b981;
      }
      button {
        width: 100%;
        border-radius: 6px;
        padding: 10px;
        font-family: inherit;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        margin-bottom: 8px;
      }
      .btn-primary {
        background: #10b981;
        color: #000;
        border: none;
      }
      .btn-primary:hover {
        background: #0ea371;
      }
      .btn-secondary {
        background: transparent;
        color: #d1d5db;
        border: 1px solid #374151;
      }
      .btn-secondary:hover {
        border-color: #6b7280;
      }
      .email {
        font-size: 11px;
        color: #9ca3af;
        margin-bottom: 14px;
        word-break: break-all;
      }
      .card {
        border: 1px solid #262626;
        border-radius: 8px;
        padding: 14px;
        margin-bottom: 14px;
      }
      .session-name {
        font-weight: 700;
        font-size: 15px;
        margin-bottom: 6px;
      }
      .countdown {
        font-size: 24px;
        font-weight: 700;
        color: #10b981;
        margin-bottom: 10px;
      }
      .domains {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .domain-pill {
        font-size: 10px;
        border: 1px solid #374151;
        color: #9ca3af;
        border-radius: 999px;
        padding: 3px 8px;
      }
      .empty-title {
        font-weight: 700;
        margin-bottom: 4px;
      }
      .empty-sub {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 16px;
      }
      .error {
        color: #f87171;
        font-size: 12px;
        margin-bottom: 10px;
      }
      .empty-sub.warning {
        color: #f59e0b;
      }
      .end-icon {
        font-size: 28px;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <span class="dot"></span>
      <span>MOMENTUM</span>
    </div>

    <div id="view-login">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="toi@exemple.com" />
      <label for="password">Mot de passe</label>
      <input id="password" type="password" placeholder="••••••••" />
      <p id="login-error" class="error hidden"></p>
      <button id="btn-login" class="btn-primary">Se connecter</button>
    </div>

    <div id="view-active" class="hidden">
      <p class="email" id="active-email"></p>
      <div class="card">
        <div class="session-name" id="active-name"></div>
        <div class="countdown" id="active-countdown">--:--</div>
        <div class="domains" id="active-domains"></div>
      </div>
      <button id="btn-stop" class="btn-secondary">Arrêter</button>
      <button id="btn-logout-1" class="btn-secondary">Déconnexion</button>
    </div>

    <div id="view-empty" class="hidden">
      <p class="email" id="empty-email"></p>
      <p class="empty-title">Aucune session active</p>
      <p class="empty-sub">Déclare ce sur quoi tu vas travailler pour démarrer.</p>
      <button id="btn-manual" class="btn-primary">Démarrer une session</button>
      <button id="btn-logout-2" class="btn-secondary">Déconnexion</button>
    </div>

    <div id="view-start-session" class="hidden">
      <p class="email" id="start-email"></p>

      <label for="tache">Que vas-tu faire ?</label>
      <input id="tache" type="text" placeholder="Ex: Chapitre 3 thermodynamique" />

      <label for="projet">Projet</label>
      <select id="projet"></select>
      <input id="new-projet-nom" type="text" placeholder="Nom du nouveau projet" class="hidden" />

      <label for="duree">Durée</label>
      <select id="duree">
        <option value="25">25 min</option>
        <option value="45">45 min</option>
        <option value="60">60 min</option>
        <option value="90">90 min</option>
        <option value="custom">Personnalisé</option>
      </select>
      <input id="duree-custom" type="number" min="1" placeholder="Minutes" class="hidden" />

      <p id="start-error" class="error hidden"></p>
      <button id="btn-start-session" class="btn-primary">Démarrer la session →</button>
      <button id="btn-cancel-start" class="btn-secondary">Annuler</button>
    </div>

    <div id="view-session-end" class="hidden">
      <p class="end-icon">✓</p>
      <p class="empty-title">Session terminée !</p>
      <p class="empty-sub" id="end-summary"></p>
      <p class="empty-sub hidden" id="end-habitude"></p>
      <button id="btn-new-session" class="btn-primary">Nouvelle session</button>
      <button id="btn-close-end" class="btn-secondary">Fermer</button>
    </div>

    <script src="supabase.js"></script>
    <script src="blockedSites.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
